name: CI Pipeline

on:
  push:
    branches:
      - master

jobs:

  send-approval-mail:
    runs-on: ubuntu-latest

    steps:
      - name: Send Approval Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Approval Required: Build Pipeline"
          to: durgasatyanarayana52@gmail.com
          from: GitHub-Actions
          body: |
            A new code push to master requires approval before build starts.

            Please click the link below to review and approve the pipeline:

            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            After approval, the build process will start.

  approval-before-build:
    runs-on: ubuntu-latest
    needs: send-approval-mail
    environment: build-approval

    steps:
      - name: Waiting for Approval
        run: echo "Approved to start build"

  build:
    runs-on: ubuntu-latest
    needs: approval-before-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t ubuntu:latest .
